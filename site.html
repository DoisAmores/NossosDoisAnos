<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nós Dois ♡</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=EB+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose-mid:   #c0395a;
      --rose-light: #e8879a;
      --rose-pale:  #f5c6d0;
      --gold:       #c9955c;
      --gold-light: #e8c49a;
      --bg:         #0a0108;
      --text:       #fdf0f3;
      --muted:      rgba(253,240,243,0.4);
      --divider:    rgba(232,135,154,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      overflow-x: hidden;
    }

    /* ── PARALLAX ── */
    .parallax-wrap {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .p-layer { position: absolute; inset: -40% 0; will-change: transform; }

    /* Camada 1 — mais lenta, manchas grandes e escuras */
    .p-layer-1 {
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(100,5,32,0.7) 0%, transparent 55%),
        radial-gradient(ellipse 75% 55% at 90% 80%, rgba(80,3,25,0.65) 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 50% 55%, rgba(45,2,15,0.5) 0%, transparent 60%);
    }

    /* Camada 2 — velocidade média, tom mais rosado */
    .p-layer-2 {
      background:
        radial-gradient(ellipse 65% 50% at 85% 10%, rgba(140,20,55,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 15% 90%, rgba(115,12,42,0.4) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 55% 48%, rgba(150,40,70,0.15) 0%, transparent 60%);
    }

    /* Camada 3 — mais rápida, brilhos rose claros */
    .p-layer-3 {
      background:
        radial-gradient(ellipse 50% 40% at 48% 42%, rgba(180,70,100,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 35% 28% at 25% 25%, rgba(200,100,125,0.09) 0%, transparent 50%),
        radial-gradient(ellipse 35% 28% at 75% 75%, rgba(165,60,90,0.08) 0%, transparent 50%);
    }

    /* Camada 4 — canvas com estrelas/partículas sutis */
    #pl4 { inset: 0; width: 100%; height: 100%; }

    /* ── CONTENT ── */
    .content { position: relative; z-index: 10; }

    /* ── HERO ── */
    .hero {
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 25vh 2rem 3rem;
    }

    .hero-text {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem;
      width: 100%;
    }

    .ornament {
      display: flex; align-items: center; gap: 1rem;
      animation: fadeUp 1.4s ease both 0.1s;
    }
    .orn-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, rgba(232,135,154,0.5)); }
    .orn-line.r { background: linear-gradient(90deg, rgba(232,135,154,0.5), transparent); }
    .orn-center { font-size: 1rem; color: rgba(232,135,154,0.5); letter-spacing: 0.3em; }

    .hero-eyebrow {
      font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: rgba(232,135,154,0.45);
      animation: fadeUp 1.4s ease both 0.2s;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-weight: 400;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: 1.05;
      background: linear-gradient(160deg, #fce7f3 0%, var(--rose-light) 50%, rgba(192,57,90,0.9) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: fadeUp 1.5s ease both 0.3s;
    }

    .hero-divider {
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, rgba(232,135,154,0.4), transparent);
      animation: fadeUp 1.5s ease both 0.45s;
    }

    .hero-sub {
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-style: italic; color: var(--muted);
      line-height: 1.7; max-width: 420px;
      animation: fadeUp 1.5s ease both 0.5s;
    }

    .scroll-hint {
      position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      color: rgba(232,135,154,0.3); font-size: 0.62rem; letter-spacing: 0.25em;
      text-transform: uppercase;
      animation: fadeUp 1.5s ease both 0.7s;
    }
    .scroll-line {
      width: 1px; height: 45px;
      background: linear-gradient(to bottom, rgba(232,135,154,0.4), transparent);
      animation: scrollPulse 2.2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { opacity: 0.4; } 50% { opacity: 1; }
    }

    /* ── CARROSSEL 3D ── */
    .carousel-section {
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 10;
      /* Limita altura para não detectar hover em área vazia */
      overflow: hidden;
    }

    .carousel-3d-wrap {
      position: relative;
      width: min(96vw, 700px);
      /* Altura maior para acomodar fotos quase quadradas */
      height: min(65vw, 500px);
    }

    #carouselContainer {
      position: absolute; width: 100%; height: 100%;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    #contentContainer {
      position: absolute; left: 50%; top: 50%;
      width: 100%; height: 100%;
      transform: translate(-50%, -50%);
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .carouselItem {
      position: absolute; left: 50%; top: 50%;
      width: clamp(120px, 28vw, 320px);
      height: clamp(109px, 25.5vw, 291px); /* 1.1:1 ratio */
      margin-left: calc(clamp(120px, 28vw, 320px) / -2);
      margin-top: calc(clamp(109px, 25.5vw, 291px) / -2);
      visibility: hidden;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .carouselItemInner {
      width: 100%; height: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.55), 0 0 0 1px rgba(232,135,154,0.08);
    }

    .carouselItemInner img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }

    /* Separador entre carrossel e cards */
    .carousel-divider {
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(232,135,154,0.2), transparent);
      margin: 2rem auto 0;
    }

    /* ── CARDS WRAP ── */
    .cards-wrap {
      padding: 2rem 0 10rem;
      border-top: 1px solid var(--divider);
      border-bottom: 1px solid var(--divider);
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── CARD BASE ── */
    .nav-card {
      display: block; text-decoration: none; width: 100%;
      padding: 4rem clamp(2rem, 6vw, 5rem);
      position: relative; overflow: hidden; cursor: pointer;
      opacity: 0; transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .nav-card.visible { opacity: 1; transform: translateY(0); }
    .nav-card.hiding  { opacity: 0; transform: translateY(40px); }

    /* Linha separadora */
    .nav-card::before {
      content: ''; position: absolute;
      top: 0; left: clamp(2rem, 6vw, 5rem); right: clamp(2rem, 6vw, 5rem);
      height: 1px; background: var(--divider);
      transition: background 0.5s ease;
    }
    .nav-card:hover::before { background: rgba(232,135,154,0.3); }

    /* Hover — fundo desliza da esquerda */
    .nav-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, rgba(192,57,90,0.07) 0%, rgba(192,57,90,0.02) 60%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-card:hover::after { transform: translateX(0); }

    /* Linha lateral que cresce */
    .card-accent {
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 0;
      background: linear-gradient(to bottom, transparent, var(--rose-mid), transparent);
      transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 99px;
    }
    .nav-card:hover .card-accent { height: 70%; }

    .card-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 2rem; position: relative; z-index: 1; max-width: 900px;
    }
    .card-left { display: flex; align-items: baseline; gap: 2rem; flex: 1; }

    .card-index {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      color: rgba(192,57,90,0.2); line-height: 1; white-space: nowrap;
      transition: color 0.4s ease; user-select: none;
    }
    .nav-card:hover .card-index { color: rgba(192,57,90,0.5); }

    .card-text { flex: 1; }
    .card-title {
      font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400;
      font-size: clamp(2rem, 3.5vw, 3.2rem); color: var(--text); line-height: 1.1;
      transition: color 0.4s ease;
    }
    .nav-card:hover .card-title { color: var(--rose-pale); }

    .card-desc {
      margin-top: 0.4rem;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      color: var(--muted); font-style: italic; letter-spacing: 0.04em;
      transition: color 0.4s ease;
    }
    .nav-card:hover .card-desc { color: rgba(245,198,208,0.6); }

    .card-arrow {
      color: rgba(192,57,90,0.3); font-size: 1.3rem;
      transition: transform 0.4s ease, color 0.4s ease; flex-shrink: 0;
    }
    .nav-card:hover .card-arrow { transform: translateX(8px); color: var(--rose-mid); }

    /* ── CARD ESPECIAL — 2 ANOS ── */
    .nav-card-special {
      position: relative;
    }

    /* Borda rose/dourada intensa nas laterais */
    .nav-card-special .card-accent {
      background: linear-gradient(to bottom, transparent, var(--gold), var(--rose-mid), transparent);
      width: 3px;
    }
    .nav-card-special:hover .card-accent { height: 80%; }

    /* Hover com tom dourado */
    .nav-card-special::after {
      background: linear-gradient(105deg, rgba(201,149,92,0.1) 0%, rgba(192,57,90,0.05) 60%, transparent 100%);
    }
    .nav-card-special:hover::before { background: rgba(201,149,92,0.35); }

    /* Borda fina dourada no topo */
    .nav-card-special::before {
      background: linear-gradient(90deg, transparent, rgba(201,149,92,0.4), rgba(192,57,90,0.4), transparent) !important;
      height: 1px;
    }

    /* Índice dourado */
    .nav-card-special .card-index {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      opacity: 0.6;
    }
    .nav-card-special:hover .card-index { opacity: 1; }

    /* Título dourado/rose */
    .nav-card-special .card-title {
      background: linear-gradient(135deg, #fce7f3, var(--rose-light), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-card-special:hover .card-title {
      background: linear-gradient(135deg, #fff, var(--rose-pale), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* Seta dourada */
    .nav-card-special .card-arrow { color: rgba(201,149,92,0.4); }
    .nav-card-special:hover .card-arrow { color: var(--gold); transform: translateX(8px); }

    /* Ornamento floral discreto */
    .card-ornament {
      position: absolute; right: clamp(2rem, 8vw, 7rem); top: 50%; transform: translateY(-50%);
      font-size: 1.1rem; opacity: 0.15; pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 1;
    }
    .nav-card-special:hover .card-ornament { opacity: 0.4; }

    /* ── FOOTER ── */
    .footer {
      text-align: center; padding: 4rem 2rem 6rem;
      color: rgba(232,135,154,0.2); font-size: 0.72rem; letter-spacing: 0.2em;
    }
    .footer span { display: inline-block; margin: 0 0.5rem; font-style: italic; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<script>
// ── AUTH CHECK (comentado para testes — descomentar antes de publicar) ──

if (sessionStorage.getItem('autenticado') !== 'true') {
  window.location.href = 'index.html';
}


// ── PARALLAX + PARTÍCULAS ────────────────────────────────────────
const pl1 = document.getElementById('pl1');
const pl2 = document.getElementById('pl2');
const pl3 = document.getElementById('pl3');
const pl4 = document.getElementById('pl4');
const ctx4 = pl4.getContext('2d');
let ticking = false;

let particles = [];
function resizeCanvas() {
  pl4.width  = innerWidth;
  pl4.height = innerHeight;
  initParticles();
}
function initParticles() {
  particles = Array.from({ length: 90 }, () => ({
    x:     Math.random() * pl4.width,
    y:     Math.random() * pl4.height,
    r:     Math.random() * 1.2 + 0.2,
    alpha: Math.random() * 0.1 + 0.02,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.003 + 0.0008,
    vx:    (Math.random() - 0.5) * 0.08,
    vy:    (Math.random() - 0.5) * 0.08,
  }));
}

window.addEventListener('scroll', () => {
  if (!ticking) {
    requestAnimationFrame(() => {
      const y = window.scrollY;
      pl1.style.transform = `translateY(${y * 0.08}px)`;
      pl2.style.transform = `translateY(${y * 0.2}px)`;
      pl3.style.transform = `translateY(${y * 0.38}px)`;
      ticking = false;
    });
    ticking = true;
  }
});

function drawParticles() {
  ctx4.clearRect(0, 0, pl4.width, pl4.height);
  particles.forEach(p => {
    p.phase += p.speed;
    p.x += p.vx; p.y += p.vy;
    if (p.x < -5) p.x = pl4.width + 5;
    if (p.x > pl4.width + 5) p.x = -5;
    if (p.y < -5) p.y = pl4.height + 5;
    if (p.y > pl4.height + 5) p.y = -5;
    const a = p.alpha * 0.5 * (0.4 + 0.6 * Math.sin(p.phase));
    ctx4.beginPath();
    ctx4.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx4.fillStyle = `rgba(232,135,154,${a})`;
    ctx4.fill();
  });
  requestAnimationFrame(drawParticles);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
drawParticles();

// ── SCROLL REVEAL BIDIRECIONAL ───────────────────────────────────
// Aparece ao entrar vindo de baixo (descendo)
// Some apenas quando sai por baixo ao subir o scroll
// Ao descer de novo, NÃO some os cards que já ficaram para trás
const cards = document.querySelectorAll('.nav-card');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const card  = entry.target;
    const rect  = card.getBoundingClientRect();

    if (entry.isIntersecting) {
      card.classList.remove('hiding');
      const idx = Array.from(cards).indexOf(card);
      setTimeout(() => card.classList.add('visible'), idx * 60);
    } else {
      // Saiu da viewport
      const exitedAbove = rect.bottom < 0; // card saiu por cima → scroll descendo além dele
      const exitedBelow = rect.top > window.innerHeight; // card ainda não entrou ou voltou ao subir

      if (exitedBelow && card.classList.contains('visible')) {
        // Saiu por baixo = usuário subiu o scroll, card some
        card.classList.remove('visible');
        card.classList.add('hiding');
        setTimeout(() => card.classList.remove('hiding'), 750);
      }
      // exitedAbove = usuário desceu além do card → mantém visível, não faz nada
    }
  });
}, { threshold: 0.12 });

cards.forEach(c => observer.observe(c));
</script>

<!-- GSAP + jQuery para o carrossel 3D -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
<script>
// ── CARROSSEL 3D ─────────────────────────────────────────────────
$(document).ready(function() {
  var container3d = $('#contentContainer');
  var carousel3d  = $('#carouselContainer');
  var items3d     = $('.carouselItem');
  var itemLength  = items3d.length;

  var rY       = 360 / itemLength;
  // Raio responsivo: menor em telas pequenas, maior no desktop
  var baseRadius = Math.min(window.innerWidth * 0.18, 200);
  var radius3d = Math.round(baseRadius / Math.tan(Math.PI / itemLength));

  TweenMax.set(container3d, { perspective: 800 });
  TweenMax.set(carousel3d,  { z: -radius3d });

  for (var i = 0; i < itemLength; i++) {
    TweenMax.set(items3d.eq(i), {
      rotationY:       rY * i,
      z:               radius3d,
      transformOrigin: '50% 50% ' + (-radius3d) + 'px',
      autoAlpha:       1
    });
  }

  var addX         = 0;
  var autoSpeed    = 0.12;
  var currentSpeed = autoSpeed;
  var targetSpeed  = autoSpeed;

  var isDragging = false;
  var dragStartX = 0;
  var dragLastX  = 0;
  var dragVelX   = 0;
  var mouseY     = 0;
  var isHovering = false;

  // Zona de hover: largura = diâmetro horizontal, altura = raio + meia-altura da foto × 2
  var carouselWrap = document.querySelector('.carousel-3d-wrap');
  var photoW    = Math.min(window.innerWidth * 0.28, 320);
  var photoH    = photoW / 1.1;
  var diameter  = (radius3d + photoW / 2) * 2;
  var hoverW    = Math.min(diameter, window.innerWidth * 0.96);
  var hoverH    = radius3d * 2 + photoH;

  // Ajusta largura do wrap ao diâmetro real do carrossel
  carouselWrap.style.width = hoverW + 'px';

  var hoverZone = document.createElement('div');
  hoverZone.style.cssText = [
    'position:absolute',
    'left:50%',
    'top:50%',
    'width:'  + hoverW + 'px',
    'height:' + hoverH + 'px',
    'transform:translate(-50%,-50%)',
    'border-radius:50%',
    'z-index:20',
    'cursor:grab',
    'pointer-events:auto',
  ].join(';');
  carouselWrap.appendChild(hoverZone);

  // ── Hover: pausa rotação automática ──
  hoverZone.addEventListener('mouseenter', function() {
    isHovering  = true;
    targetSpeed = 0;
    hoverZone.style.cursor = 'grab';
  });
  hoverZone.addEventListener('mouseleave', function() {
    if (!isDragging) {
      isHovering  = false;
      targetSpeed = autoSpeed;
      mouseY      = 0;
    }
  });

  // ── Drag com mouse ──
  hoverZone.addEventListener('mousedown', function(e) {
    isDragging  = true;
    dragStartX  = e.clientX;
    dragLastX   = e.clientX;
    dragVelX    = 0;
    targetSpeed = 0;
    hoverZone.style.cursor = 'grabbing';
    e.preventDefault();
  });

  window.addEventListener('mousemove', function(e) {
    if (isDragging) {
      var dx   = e.clientX - dragLastX;
      dragVelX = dx * 0.08;
      addX    += dragVelX;
      dragLastX = e.clientX;
    }
  });

  window.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      hoverZone.style.cursor = 'grab';
      if (!isHovering) targetSpeed = autoSpeed;
    }
  });

  // ── Touch ──
  hoverZone.addEventListener('touchstart', function(e) {
    isDragging  = true;
    dragStartX  = e.touches[0].clientX;
    dragLastX   = e.touches[0].clientX;
    targetSpeed = 0;
  });
  hoverZone.addEventListener('touchmove', function(e) {
    var dx   = e.touches[0].clientX - dragLastX;
    dragVelX = dx * 0.08;
    addX    += dragVelX;
    dragLastX = e.touches[0].clientX;
  });
  hoverZone.addEventListener('touchend', function() {
    isDragging  = false;
    targetSpeed = autoSpeed;
  });

  // ── Loop ──
  setInterval(function() {
    // Suaviza a transição de velocidade
    currentSpeed += (targetSpeed - currentSpeed) * 0.06;

    if (!isDragging) {
      addX += currentSpeed;
    }

    TweenMax.to(carousel3d, 1, {
      rotationY: addX,
      rotationX: mouseY,
      ease:      Quint.easeOut
    });
  }, 1000 / 60);
});
</script>
</body>
</html>
