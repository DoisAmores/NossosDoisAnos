<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nossos Dois Anos ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=EB+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --rose-mid:#c0395a;
      --rose-light:#e8879a;
      --rose-pale:#f5c6d0;
      --muted:rgba(253,240,243,0.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      background:radial-gradient(ellipse at 40% 40%,#180028 0%,#060010 65%);
      font-family:'EB Garamond',serif;
      color:#fdf0f3;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* ── BG CANVAS ── */
    canvas.bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* ── SCENE ── */
    .scene{
      position:relative;z-index:10;
      width:min(92vw,580px);
      height:min(92vw,580px);
      display:flex;align-items:center;justify-content:center;
    }
    canvas.main{position:absolute;inset:0;z-index:5;}

    /* ── CENTRO ── */
    .center{
      position:absolute;text-align:center;z-index:20;
      display:flex;flex-direction:column;align-items:center;gap:0.5rem;
      cursor:pointer;user-select:none;
    }
    .center h1{
      font-family:'Playfair Display',serif;font-style:italic;
      font-size:clamp(1.5rem,4.5vw,2.4rem);
      background:linear-gradient(135deg,#fce7f3,var(--rose-light),var(--rose-mid));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1.2;
    }
    .hint{
      font-size:0.7rem;color:var(--muted);letter-spacing:0.2em;
      transition:opacity 0.5s;
    }
    .hint.gone{opacity:0;pointer-events:none;}

    /* ── RIPPLE ── */
    .pulse-ring{
      position:absolute;width:80px;height:80px;border-radius:50%;
      border:2px solid rgba(232,135,154,0.8);pointer-events:none;opacity:0;
    }
    .pulse-ring.go{animation:pulseOut 0.8s ease forwards;}
    @keyframes pulseOut{
      0%{transform:scale(1);opacity:0.8;}
      100%{transform:scale(6);opacity:0;}
    }

    /* ── LABELS DAS ESTRELAS ── */
    .star-label{
      position:absolute;transform:translate(-50%,-50%);
      font-size:0.63rem;letter-spacing:0.18em;text-transform:uppercase;
      color:rgba(232,135,154,0);white-space:nowrap;
      pointer-events:none;z-index:21;
      transition:color 0.5s,opacity 0.5s;opacity:0;
    }
    .star-label.show{
      color:rgba(232,135,154,0.45);
      pointer-events:auto;cursor:pointer;opacity:1;
    }
    .star-label.show:hover{color:var(--rose-light);}

    /* ── PLAYER FLUTUANTE ── */
    #player{
      position:fixed;bottom:1.5rem;right:1.5rem;
      z-index:100;display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;
    }

    /* Controles expandidos */
    #player-controls{
      display:flex;align-items:center;gap:0.5rem;
      background:rgba(17,2,8,0.85);
      border:1px solid rgba(232,135,154,0.2);
      border-radius:99px;
      padding:0.4rem 0.9rem 0.4rem 0.7rem;
      backdrop-filter:blur(12px);
      overflow:hidden;
      max-width:0;opacity:0;
      transition:max-width 0.4s cubic-bezier(.4,0,.2,1), opacity 0.35s ease, padding 0.4s;
      white-space:nowrap;
    }
    #player-controls.open{max-width:220px;opacity:1;}

    .player-btn{
      background:none;border:none;cursor:pointer;
      color:rgba(232,135,154,0.7);font-size:1rem;
      padding:0.2rem;line-height:1;
      transition:color 0.2s,transform 0.2s;
    }
    .player-btn:hover{color:var(--rose-light);transform:scale(1.2);}

    #player-title{
      font-size:0.62rem;letter-spacing:0.1em;
      color:rgba(232,135,154,0.5);
      max-width:110px;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap;
      font-family:'EB Garamond',serif;font-style:italic;
    }

    /* Botão principal (nota musical) */
    #player-toggle{
      width:40px;height:40px;border-radius:50%;
      background:rgba(17,2,8,0.85);
      border:1px solid rgba(232,135,154,0.25);
      backdrop-filter:blur(12px);
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      color:rgba(232,135,154,0.7);font-size:1.1rem;
      transition:border-color 0.3s,color 0.3s,transform 0.2s;
      flex-shrink:0;
    }
    #player-toggle:hover{border-color:rgba(232,135,154,0.5);color:var(--rose-light);transform:scale(1.08);}
    #player-toggle.playing{color:var(--rose-light);border-color:rgba(232,135,154,0.4);}

    /* Barra de progresso minimalista */
    #player-bar{
      width:100%;height:1px;
      background:rgba(232,135,154,0.1);
      border-radius:1px;
      overflow:hidden;
      display:none;
    }
    #player-bar.show{display:block;}
    #player-progress{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--rose-mid),var(--rose-light));
      transition:width 1s linear;
    }
  </style>
</head>
<body>

<!-- Verificação de autenticação -->
<script>
  if(sessionStorage.getItem('autenticado') !== 'true'){
    window.location.href = 'index.html';
  }
</script>

<canvas class="bg" id="bg"></canvas>

<!-- Menu -->
<div class="scene" id="scene">
  <canvas class="main" id="main"></canvas>
  <div class="pulse-ring" id="pulse"></div>
  <div class="center" id="center">
    <h1>dois anos,<br/>Larissa ♡</h1>
    <p class="hint" id="hint">toque para explorar ✦</p>
  </div>
</div>

<!-- Player flutuante -->
<div id="player">
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <div id="player-controls">
      <button class="player-btn" id="btn-prev" title="Anterior">⏮</button>
      <button class="player-btn" id="btn-play" title="Pausar">⏸</button>
      <button class="player-btn" id="btn-next" title="Próxima">⏭</button>
      <span id="player-title">—</span>
    </div>
    <button id="player-toggle" title="Música">♪</button>
  </div>
  <div id="player-bar"><div id="player-progress"></div></div>
</div>

<audio id="audio"></audio>

<script>
// ═══════════════════════════════════════════════════════
// MÚSICA DE FUNDO
// ═══════════════════════════════════════════════════════
// Adicione os arquivos .mp3 na pasta musicas/ do repositório
// e liste os nomes aqui:
const PLAYLIST = [
  // Exemplo: { title: 'Nome da Música', src: 'musicas/musica1.mp3' },
  // { title: 'Nome da Música 2', src: 'musicas/musica2.mp3' },
];

const audio      = document.getElementById('audio');
const btnPlay    = document.getElementById('btn-play');
const btnPrev    = document.getElementById('btn-prev');
const btnNext    = document.getElementById('btn-next');
const titleEl    = document.getElementById('player-title');
const toggleBtn  = document.getElementById('player-toggle');
const controls   = document.getElementById('player-controls');
const bar        = document.getElementById('player-bar');
const progress   = document.getElementById('player-progress');

let currentIdx = 0;
let playerOpen = false;
let isPlaying  = false;

function shuffleFirst(){
  if(PLAYLIST.length === 0) return;
  currentIdx = Math.floor(Math.random() * PLAYLIST.length);
}

function loadTrack(idx){
  if(PLAYLIST.length === 0){ titleEl.textContent = '—'; return; }
  currentIdx = (idx + PLAYLIST.length) % PLAYLIST.length;
  audio.src  = PLAYLIST[currentIdx].src;
  titleEl.textContent = PLAYLIST[currentIdx].title;
  if(isPlaying){ audio.play().catch(()=>{}); }
}

function play(){
  if(PLAYLIST.length === 0) return;
  audio.play().then(()=>{
    isPlaying = true;
    btnPlay.textContent = '⏸';
    toggleBtn.classList.add('playing');
    bar.classList.add('show');
  }).catch(()=>{});
}

function pause(){
  audio.pause();
  isPlaying = false;
  btnPlay.textContent = '▶';
  toggleBtn.classList.remove('playing');
}

btnPlay.addEventListener('click', ()=>{ isPlaying ? pause() : play(); });
btnNext.addEventListener('click', ()=>{ loadTrack(currentIdx + 1); if(isPlaying) play(); });
btnPrev.addEventListener('click', ()=>{ loadTrack(currentIdx - 1); if(isPlaying) play(); });
audio.addEventListener('ended',  ()=>{ loadTrack(currentIdx + 1); play(); });

audio.addEventListener('timeupdate', ()=>{
  if(!audio.duration) return;
  progress.style.width = (audio.currentTime / audio.duration * 100) + '%';
});

toggleBtn.addEventListener('click', ()=>{
  playerOpen = !playerOpen;
  controls.classList.toggle('open', playerOpen);
  // Toca automaticamente na primeira abertura
  if(playerOpen && !isPlaying && PLAYLIST.length > 0){
    if(!audio.src){ shuffleFirst(); loadTrack(currentIdx); }
    play();
  }
});

// Inicia com música aleatória (mas aguarda interação do usuário)
if(PLAYLIST.length > 0){
  shuffleFirst();
  loadTrack(currentIdx);
  // Tenta autoplay — funciona em alguns browsers após interação prévia (login)
  audio.play().then(()=>{
    isPlaying=true;
    btnPlay.textContent='⏸';
    toggleBtn.classList.add('playing');
    bar.classList.add('show');
  }).catch(()=>{
    // Browser bloqueou — aguarda o usuário clicar no player
  });
}

// ═══════════════════════════════════════════════════════
// MENU — ESPIRAL ORBITAL
// ═══════════════════════════════════════════════════════
const items=[
  {label:'álbum',          href:'album.html'},
  {label:'linha do tempo', href:'linha-do-tempo.html'},
  {label:'carta',          href:'carta.html'},
  {label:'galeria',        href:'galeria.html'},
  {label:'segredo',        href:'segredo.html'},
];

// ── BG ─────────────────────────────────────────────────
const bgCv=document.getElementById('bg'),bgCtx=bgCv.getContext('2d');
let bgS=[];
function resizeBg(){bgCv.width=innerWidth;bgCv.height=innerHeight;}
function mkBg(){return{x:Math.random()*bgCv.width,y:Math.random()*bgCv.height,r:Math.random()*1.1+0.1,a:Math.random()*0.4+0.05,phase:Math.random()*Math.PI*2,speed:Math.random()*0.003+0.001};}
function initBg(){bgS=Array.from({length:220},mkBg);}
function drawBg(){bgCtx.clearRect(0,0,bgCv.width,bgCv.height);bgS.forEach(s=>{s.phase+=s.speed;const a=s.a*(0.5+0.5*Math.sin(s.phase));bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);bgCtx.fillStyle=`rgba(255,215,235,${a})`;bgCtx.fill();});requestAnimationFrame(drawBg);}
window.addEventListener('resize',()=>{resizeBg();initBg();setup();});
resizeBg();initBg();drawBg();

// ── ÓRBITA ─────────────────────────────────────────────
const scene=document.getElementById('scene');
const cv=document.getElementById('main');
const ctx=cv.getContext('2d');
const N=items.length;

const ORBIT_SPEED=(Math.PI*2)/(70000/16.67); // uma volta a cada 70s
const SPIRAL_DUR=1600;
const SPIRAL_TURNS=1.6;

let W,H,CX,CY,R;
let labelEls=[];
let revealed=false;
let revealMs=0;

const finalAngles=items.map((_,i)=>(i/N)*Math.PI*2 - Math.PI/2);

const stars=items.map((item,i)=>({
  item,
  startAngle: finalAngles[i] - Math.PI*2*SPIRAL_TURNS,
  finalAngle: finalAngles[i],
  angle:0, radius:0,
  phase:'idle',
  glowPulse:Math.random()*Math.PI*2,
  glowSpeed:0.012+Math.random()*0.008,
}));

const trails=items.map(()=>[]);

function setup(){
  W=cv.width=scene.offsetWidth;
  H=cv.height=scene.offsetHeight;
  CX=W/2; CY=H/2; R=W*0.39;
  labelEls.forEach(e=>e.remove()); labelEls=[];
  items.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='star-label';
    el.textContent=item.label;
    el.addEventListener('click',()=>{ if(revealed) location.href=item.href; });
    scene.appendChild(el);
    labelEls.push(el);
  });
}

function startReveal(){
  revealed=true;
  revealMs=performance.now();
  document.getElementById('hint').classList.add('gone');
  const pulse=document.getElementById('pulse');
  pulse.classList.remove('go'); void pulse.offsetWidth; pulse.classList.add('go');
  stars.forEach((s,i)=>{
    s.phase='spiral';
    s.angle=s.startAngle;
    s.radius=0;
    trails[i]=[];
  });
}

function easeOutQuart(t){ return 1-Math.pow(1-t,4); }

let ringAlpha=0, lineAlpha=0;

function frame(now){
  ctx.clearRect(0,0,W,H);

  if(revealed){
    const elapsed=now-revealMs;
    if(elapsed>SPIRAL_DUR){
      ringAlpha=Math.min((elapsed-SPIRAL_DUR)/1200,1)*0.08;
      lineAlpha=Math.min((elapsed-SPIRAL_DUR)/1600,1)*0.06;
    }
  }

  // Anel orbital
  if(ringAlpha>0){
    ctx.save();
    ctx.strokeStyle=`rgba(232,135,154,${ringAlpha})`;
    ctx.lineWidth=1; ctx.setLineDash([2,12]);
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }

  // Linhas de constelação
  if(lineAlpha>0){
    ctx.save();
    ctx.strokeStyle=`rgba(232,135,154,${lineAlpha})`;
    ctx.lineWidth=1; ctx.setLineDash([3,9]);
    stars.forEach((s,i)=>{
      if(s.phase!=='orbit') return;
      const ns=stars[(i+1)%N];
      if(ns.phase!=='orbit') return;
      ctx.beginPath();
      ctx.moveTo(CX+Math.cos(s.angle)*R, CY+Math.sin(s.angle)*R);
      ctx.lineTo(CX+Math.cos(ns.angle)*R, CY+Math.sin(ns.angle)*R);
      ctx.stroke();
    });
    ctx.setLineDash([]); ctx.restore();
  }

  stars.forEach((s,i)=>{
    if(s.phase==='idle') return;

    let x,y,alpha,coreR;

    if(s.phase==='spiral'){
      const elapsed=now-revealMs;
      const t=Math.min(elapsed/SPIRAL_DUR,1);
      const e=easeOutQuart(t);
      s.angle=s.startAngle+(s.finalAngle-s.startAngle)*e;
      s.radius=e*R;
      alpha=Math.min(t*3,1);
      coreR=3+e*3;
      x=CX+Math.cos(s.angle)*s.radius;
      y=CY+Math.sin(s.angle)*s.radius;
      trails[i].push({x,y});
      if(trails[i].length>45) trails[i].shift();
      if(t>=1){ s.phase='orbit'; s.angle=s.finalAngle; trails[i]=[]; }
    }
    else if(s.phase==='orbit'){
      s.angle+=ORBIT_SPEED;
      s.glowPulse+=s.glowSpeed;
      x=CX+Math.cos(s.angle)*R;
      y=CY+Math.sin(s.angle)*R;
      alpha=1; coreR=5.5;
    }

    if(x==null) return;

    // Trilha
    if(trails[i].length>1){
      for(let j=1;j<trails[i].length;j++){
        const ta=j/trails[i].length;
        const p=trails[i][j-1],q=trails[i][j];
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
        ctx.strokeStyle=`rgba(192,57,90,${ta*0.4})`;
        ctx.lineWidth=1.5*(1-ta)+0.3;
        ctx.stroke();
      }
    }

    // Glow
    const gA=(s.phase==='orbit')?0.28+0.12*Math.sin(s.glowPulse):alpha*0.32;
    const grd=ctx.createRadialGradient(x,y,0,x,y,coreR*6);
    grd.addColorStop(0,`rgba(192,57,90,${gA})`);
    grd.addColorStop(1,'rgba(192,57,90,0)');
    ctx.beginPath();ctx.arc(x,y,coreR*6,0,Math.PI*2);
    ctx.fillStyle=grd;ctx.fill();

    // Núcleo
    const cr=ctx.createRadialGradient(x,y,0,x,y,coreR);
    cr.addColorStop(0,`rgba(255,245,250,${alpha})`);
    cr.addColorStop(0.4,`rgba(232,135,154,${alpha})`);
    cr.addColorStop(1,`rgba(192,57,90,${alpha*0.4})`);
    ctx.beginPath();ctx.arc(x,y,coreR,0,Math.PI*2);
    ctx.fillStyle=cr;ctx.fill();

    // Cruz 4 pontas
    if(s.phase==='orbit'){
      ctx.save();ctx.translate(x,y);
      ctx.globalAlpha=0.35+0.18*Math.sin(s.glowPulse);
      ctx.strokeStyle='rgba(255,230,240,0.85)';ctx.lineWidth=0.8;
      const len=coreR*2.8;
      ctx.beginPath();ctx.moveTo(0,-len);ctx.lineTo(0,len);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-len,0);ctx.lineTo(len,0);ctx.stroke();
      ctx.restore();
    }

    // Label
    if(labelEls[i]){
      const el=labelEls[i];
      el.style.left=`${x}px`;
      el.style.top=`${y+coreR+13}px`;
      if(s.phase==='orbit' && !el.classList.contains('show')) el.classList.add('show');
    }
  });

  requestAnimationFrame(frame);
}

document.getElementById('center').addEventListener('click',()=>{ if(!revealed) startReveal(); });
setup();
requestAnimationFrame(frame);
</script>
</body>
</html>
